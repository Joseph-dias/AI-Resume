<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Joey Dias · AI Resume</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

<!--React app mount point-->
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// Basic questions to display to the user
const STARTER_QUESTIONS = [
  "What makes Joey's Blazor experience stand out?",
  "Has Joey worked with Salesforce integrations?",
  "Tell me about a project Joey has built.",
  "What's Joey like to work with?",
];

// ── Components ────────────────────────────────────────────────────────────────

function Avatar({ size = 48 }) {
  const sizeClass = size === 32 ? 'avatar--sm' : size === 64 ? 'avatar--lg' : 'avatar--md';
  return ( //Avatar image
    <img
      src="/static/Me.jpeg"
      alt="Joey Dias"
      className={`avatar ${sizeClass}`}
    />
  );
}

//Online status indicator - Purely cosmetic
function StatusDot() {
  return (
    <span className="status-dot">
      <span className="status-dot__inner" />
      <span className="status-dot__ring" />
    </span>
  );
}

//This lists the sources that the AI used for its answer.  Collapsible.
function SourcePills({ sources }) {
  const [open, setOpen] = useState(false);
  if (!sources || sources.length === 0) return null; //No sources
  return (
    <div className="sources">
      <button onClick={() => setOpen(o => !o)} className="source-toggle">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="currentColor" strokeWidth="1.5"/>
          <path d="M8 7v5M8 5v1" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
        Sources
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" className={open ? 'chevron chevron--open' : 'chevron'}>
          <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
        </svg>
      </button>

      {/* Displays the source when the panel is open */}
      {open && (
        <div className="sources__list">
          {sources.map((s, i) => (
            <span key={i} className="source-pill">{s}</span>
          ))}
        </div>
      )}
    </div>
  );
}

//Blinking dots to indicate the AI is thinking.  Purely cosmetic.  Waiting for API response.
function ThinkingDots() {
  return (
    <div className="thinking-dots">
      {[0,1,2].map(i => (
        <span key={i} className="thinking-dot" />
      ))}
    </div>
  );
}

//The bubble for the AI response.
function BotMessage({ msg }) {
  return (
    <div className="bot-message">
      <Avatar size={32} />
      <div className="bot-bubble">
        {msg.thinking ? (
          <ThinkingDots />
        ) : (
          <>
            <p className="message-text">{msg.text}</p>
            <SourcePills sources={msg.sources} />
          </>
        )}
      </div>
    </div>
  );
}

//The bubble for the user message.
function UserMessage({ msg }) {
  return (
    <div className="user-message">
      <div className="user-bubble">
        <p className="message-text">{msg.text}</p>
      </div>
    </div>
  );
}

//The "how it works" section in the sidebar.  Collapsible.
function HowItWorks() {
  const [open, setOpen] = useState(false);
  return (
    <div className="how-it-works">
      <button onClick={() => setOpen(o => !o)} className="how-toggle">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="currentColor" strokeWidth="1.5"/>
          <path d="M6.5 6C6.5 5.17 7.17 4.5 8 4.5C8.83 4.5 9.5 5.17 9.5 6C9.5 6.83 8.83 7.5 8 7.5V9" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
          <circle cx="8" cy="11" r="0.6" fill="currentColor"/>
        </svg>
        How this works
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" className={open ? 'how-toggle__chevron how-toggle__chevron--open' : 'how-toggle__chevron'}>
          <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
        </svg>
      </button>
      {/* This is the how it works text that displays when the panel opens */}
      {open && (
        <ul className="how-list">
          {[
            "Answers are grounded in Joey's resume and project documents via RAG.",
            "Web search is restricted to Joey's public profiles and GitHub.",
            "This bot can't make commitments — reach out directly for interviews.",
          ].map((t, i) => (
            <li key={i} className="how-list__item">
              <span className="how-list__bullet">·</span>
              <span className="how-list__text">{t}</span>
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

//The sidebar with the profile info and links.  Persistent across the app.
function Sidebar({ onClear, isOpen, onClose }) {
  //App version
  const [appVersion, setAppVersion] = React.useState('...');
  React.useEffect(() => {
    fetch('/VERSION')
      .then(r => r.text())
      .then(v => setAppVersion(v.trim()))
      .catch(() => setAppVersion('dev'));
  }, []);

  //Links on the sidebar
  const links = [
    { label: 'GitHub', icon: <GithubIcon />, href: 'https://github.com/Joseph-dias' },
    { label: 'LinkedIn', icon: <LinkedinIcon />, href: 'https://www.linkedin.com/in/joseph-dias-49b20ab2/' },
  ];

  return ( // Renders the actual sidebar
    <aside className={isOpen ? 'sidebar sidebar--open' : 'sidebar'}>
      <div className="sidebar__profile">
        <Avatar size={64} />
        <div>
          <h1 className="sidebar__name">Joey Dias</h1>
          <p className="sidebar__title">
            Senior Software Engineer<br />
            <span className="sidebar__company">Alliance Defending Freedom</span>
          </p>
          <div className="sidebar__meta">
            <span className="sidebar__location">
              <PinIcon /> Tillamook, OR
            </span>
            <span className="sidebar__experience">· 7+ yrs</span>
          </div>
        </div>

        {/* AI instructions */}
        <p className="sidebar__quote">
          "Ask me anything about Joey's background, projects, or working style."
        </p>

        <div className="sidebar__skills">
          {['Blazor', 'Salesforce', 'C# / .NET', 'Python', 'React', 'AI/RAG'].map(skill => (
            <span key={skill} className="skill-tag">{skill}</span>
          ))}
        </div>
      </div>

      <div className="divider" />

      <div className="sidebar__links">
        <p className="links-label">Links</p>
        {links.map(({ label, icon, href }) => (
          <a key={label} href={href} target="_blank" rel="noopener noreferrer" className="sidebar-link">
            {icon} {label}
            <svg className="sidebar-link__ext" width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M2 8L8 2M8 2H4M8 2V6" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
            </svg>
          </a>
        ))}
      </div>

      <div className="divider" />
      <HowItWorks />

      <div className="sidebar__footer">
        {/* This is the button to clear the conversation context */}
        <button onClick={onClear} className="clear-btn">
          Clear Conversation
        </button>
        <p className="sidebar__credit">
          Built by Joey · Powered by Grok-4
          {appVersion !== '...' && ` · v${appVersion}`}
        </p>
      </div>
    </aside>
  );
}

function WelcomeState({ onSelect }) {
  return (
    <div className="welcome">
      <div className="welcome__hero">
        <div className="welcome__icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" fill="var(--accent)"/>
          </svg>
        </div>
        <h2 className="welcome__title">Hi, I'm Joey's AI Advocate</h2>
        <p className="welcome__subtitle">
          I can answer questions about Joey's background, projects, and experience — grounded in his resume and public profiles.
        </p>
      </div>

      <div className="welcome__starters">
        <p className="starters-label">Try asking</p>
        {/* Display the starter questions */}
        {STARTER_QUESTIONS.map((q, i) => (
          <button key={i} onClick={() => onSelect(q)} className="starter-btn">
            <span className="starter-btn__arrow">→</span>{q}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── Header ────────────────────────────────────────────────────────────────
function Header({ onMenuClick }) {
  return (
    <header className="header">
      <button className="menu-btn" onClick={onMenuClick} aria-label="Open menu">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <rect x="2" y="4"  width="16" height="2" rx="1" fill="currentColor"/>
          <rect x="2" y="9"  width="16" height="2" rx="1" fill="currentColor"/>
          <rect x="2" y="14" width="16" height="2" rx="1" fill="currentColor"/>
        </svg>
      </button>
      <Avatar size={32} />
      <div>
        <div className="header__info">
          <span className="header__name">🤖 Joey's AI Advocate</span>
          <StatusDot />
          <span className="header__status-text">Active</span>
        </div>
        <p className="header__subtitle">Grounded in Joey's resume &amp; public profiles</p>
      </div>
      <span className="header__badge">Grok-4 powered</span>
    </header>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  //States
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const closeSidebar = useCallback(() => setSidebarOpen(false), []);
  const threadRef = useRef(null);
  const inputRef = useRef(null);

  const scrollToBottom = useCallback(() => {
    if (threadRef.current) {
      threadRef.current.scrollTop = threadRef.current.scrollHeight;
    }
  }, []);

  //Scroll to bottom whenever a message is added
  useEffect(() => { scrollToBottom(); }, [messages, scrollToBottom]);

  //The user sends a message
  const sendMessage = useCallback(async (text) => {
    const userText = text || input.trim();
    if (!userText || loading) return;
    setInput('');

    const now = Date.now();
    const userMsgId = now; //Set IDs for specific messages.
    const botId = now + 1;
    setMessages(prev => [...prev,
      { id: userMsgId, role: 'user', text: userText },
      { id: botId, role: 'bot', thinking: true },
    ]);
    setLoading(true);

    //Call 'stream' with your message
    try {
      const res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: userText }),
      });
      if (!res.ok) throw new Error('API error');

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let isFirst = true;

      while (true) {
        const { done, value } = await reader.read(); //Get response
        if (done) break; //Break out when done
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop();
        for (const part of parts) {
          if (!part.startsWith('data: ')) continue;
          const payload = part.slice(6);
          if (payload === '[DONE]') break;
          const chunk = payload.replace(/\\n/g, '\n');
          if (isFirst) {
            setMessages(prev => prev.map(m =>
              m.id === botId ? { ...m, thinking: false, text: chunk } : m
            ));
            isFirst = false;
          } else {
            setMessages(prev => prev.map(m =>
              m.id === botId ? { ...m, text: m.text + chunk } : m
            ));
          }
        }
      }
    } catch {
      setMessages(prev => prev.map(m =>
        m.id === botId ? { ...m, thinking: false, text: 'Something went wrong — please try again.' } : m
      ));
    } finally {
      setLoading(false);
    }
  }, [input, loading]);

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  };

  //Clear conversation and reset context
  const clearConversation = useCallback(async () => {
    await fetch('/api/reset', { method: 'POST' });
    setMessages([]);
  }, []);

  const hasMessages = messages.length > 0;

  return (
    <div className="app">
      <Sidebar onClear={clearConversation} isOpen={sidebarOpen} onClose={closeSidebar} />
      <div
        className={sidebarOpen ? 'sidebar-backdrop sidebar-backdrop--visible' : 'sidebar-backdrop'}
        onClick={closeSidebar}
      />

      <div className="main-panel">
        <Header onMenuClick={() => setSidebarOpen(true)} />

        {/* Message thread */}
        <div ref={threadRef} className="thread">
          {!hasMessages ? (
            <WelcomeState onSelect={sendMessage} />
          ) : (
            messages.map(msg => (
              msg.role === 'user'
                ? <UserMessage key={msg.id} msg={msg} />
                : <BotMessage key={msg.id} msg={msg} />
            ))
          )}
        </div>

        {/* Input bar */}
        <div className="input-bar">
          <div className="input-wrapper">
            <textarea
              ref={inputRef}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKeyDown}
              placeholder="Ask about Joey's background, projects, or experience…"
              rows={1}
              disabled={loading}
              className="input-textarea"
              onInput={e => {
                e.target.style.height = 'auto';
                e.target.style.height = Math.min(e.target.scrollHeight, 140) + 'px';
              }}
            />
            <button
              onClick={() => sendMessage()}
              disabled={!input.trim() || loading}
              className="send-btn"
            >
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M14 8L2 2l2 6-2 6 12-6z" fill="currentColor"/>
              </svg>
            </button>
          </div>
          <p className="input-hint">
            Powered by Grok-4 · Grounded in Joey's resume documents
          </p>
        </div>
      </div>
    </div>
  );
}

// ── Icons ─────────────────────────────────────────────────────────────────────

  return (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.167 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
    </svg>
  );
}
function LinkedinIcon() {
  return (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
    </svg>
  );
}
function PinIcon() {
  return (
    <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 2C5.79 2 4 3.79 4 6c0 3.5 4 8 4 8s4-4.5 4-8c0-2.21-1.79-4-4-4zm0 5.5C7.17 7.5 6.5 6.83 6.5 6S7.17 4.5 8 4.5 9.5 5.17 9.5 6 8.83 7.5 8 7.5z"/>
    </svg>
  );
}

//Crete the React app and render it to the DOM
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
