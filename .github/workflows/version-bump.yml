name: Bump Version on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  bump-version:
    if: github.event.pull_request.merged == true && github.event.pull_request.merged_by.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump type
        id: bump_type
        run: |
          LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"
          echo "PR Labels: $LABELS"

          if [[ "$LABELS" == *"major"* ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ "$LABELS" == *"minor"* ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif [[ "$LABELS" == *"patch"* ]]; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT  # Default to patch if no label
          fi

      - name: Bump version
        id: version
        run: |
          CURRENT=$(cat VERSION)
          echo "Current version: $CURRENT"

          # Parse semantic version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.bump_type.outputs.type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "$NEW_VERSION" > VERSION
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create version bump branch
        run: |
          BRANCH_NAME="version-bump-v${{ steps.version.outputs.version }}"
          git checkout -b "$BRANCH_NAME"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin "$BRANCH_NAME"

      - name: Create pull request
        run: |
          gh pr create \
            --title "chore: bump version to ${{ steps.version.outputs.version }}" \
            --body "Automated version bump following merge of #${{ github.event.pull_request.number }}

          Bumped version from $(cat VERSION | head -1) to ${{ steps.version.outputs.version }}

          This PR was automatically created by the version bump workflow." \
            --base main \
            --head "version-bump-v${{ steps.version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}